<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240" role="img" aria-label="laradcs">
  <title>laradcs</title>
  <defs>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#0080A2"/>
      <stop offset="0.35" stop-color="#0080A2"/>
      <stop offset="0.5"  stop-color="#C8F9FC"/>
      <stop offset="0.65" stop-color="#0080A2"/>
      <stop offset="1"    stop-color="#0080A2"/>

      <animateTransform
        attributeName="gradientTransform"
        type="translate"
        from="-1 0"
        to="1 0"
        dur="10s"
        repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <text
    x="450"
    y="165"
    text-anchor="middle"
    font-family="Quicksand, 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="170"
    font-weight="700"
    letter-spacing="-4"
    fill="url(#shimmer)">laradcs</text>
</svg>
